services:
  app:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - app_data:/app/data
      - app_db:/app/db
    environment:
      - CHAT_DB_PATH=/app/db/chat_memory.db
      - AUTO_INDEX_SAMPLE_CORPUS=${AUTO_INDEX_SAMPLE_CORPUS:-true}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  app_data:
  app_db:
